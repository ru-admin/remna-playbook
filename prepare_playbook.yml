---
- name: Collect root passwords
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Add hosts with connection info
      ansible.builtin.add_host:
        name: "{{ item }}"
        ansible_host: "{{ hostvars[item].ansible_host | default(item) }}"
      loop: "{{ groups['all'] }}"

    - name: Get root password for host without ansible_password
      ansible.builtin.pause:
        prompt: "Enter root password for {{ item }}"
      register: root_passwords
      loop: "{{ groups['all'] }}"
      when: hostvars[item].ansible_password is not defined

    - name: Get user password from prompt
      ansible.builtin.pause:
        prompt: "Enter password for user {{ default_user }}"
      register: user_password_prompt
      when: user_password is not defined

    - name: Update hosts with root password
      ansible.builtin.add_host:
        name: "{{ item.item }}"
        ansible_host: "{{ hostvars[item.item].ansible_host | default(item.item) }}"
        ansible_password: "{{ item.user_input }}"
        ansible_become_pass: "{{ item.user_input }}"
      loop: "{{ root_passwords.results }}"
      when: item.skipped is not defined

    - name: Update hosts with user password from prompt
      ansible.builtin.add_host:
        name: "{{ item }}"
        ansible_host: "{{ hostvars[item].ansible_host | default(item) }}"
        user_password: "{{ user_password_prompt.user_input }}"
      loop: "{{ groups['all'] }}"
      when: user_password_prompt is defined and user_password_prompt.user_input is defined

    - name: Update hosts with user password from variable
      ansible.builtin.add_host:
        name: "{{ item }}"
        ansible_host: "{{ hostvars[item].ansible_host | default(item) }}"
        user_password: "{{ user_password }}"
      loop: "{{ groups['all'] }}"
      when: user_password is defined and (user_password_prompt is not defined or user_password_prompt.skipped is defined)

    - name: Update hosts that already have ansible_password
      ansible.builtin.add_host:
        name: "{{ item }}"
        ansible_host: "{{ hostvars[item].ansible_host | default(item) }}"
        ansible_become_pass: "{{ hostvars[item].ansible_password }}"
      loop: "{{ groups['all'] }}"
      when: hostvars[item].ansible_password is defined

- name: Create user on all hosts
  hosts: all
  gather_facts: no
  become: yes
  tasks:
    - name: Create user
      ansible.builtin.user:
        name: "{{ default_user }}"
        uid: 1000
        shell: /bin/bash
        groups: sudo
        append: yes
        password: "{{ hostvars[inventory_hostname].user_password | password_hash('sha512') }}"

    - name: Set authorized key taken from file
      ansible.posix.authorized_key:
        user: "{{ default_user }}"
        state: present
        key: "https://github.com/{{ default_user }}.keys"

    - name: Install sudo
      apt:
        name: sudo
        state: present
        update_cache: yes
